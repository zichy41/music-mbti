<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声命镜像 - 灵魂调律测试</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4"></script>

    <style>
        :root {
            --p: #6c5ce7;
            /* 强制衬线字体：Georgia 适合英文，宋体适合中文古典美 */
            --serif: "Georgia", "Times New Roman", "Songti SC", "STSong", "SimSun", serif;
            --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
        }

        /* 渲染优化：让字体看起来更平滑 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
        
        body { 
            margin: 0; 
            /* 核心流光背景：确保始终存在 */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app { 
            width: 100%; max-width: 450px; 
            background: rgba(255, 255, 255, 0.94); 
            min-height: 100vh; display: flex; flex-direction: column; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.2); 
            position: relative;
            /* 首页毛玻璃效果 */
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        .screen { padding: 45px 25px; flex: 1; display: flex; flex-direction: column; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* --- 首页：小提琴与渐变字体 --- */
        .hero-icon { font-size: 75px; text-align: center; animation: float 3s ease-in-out infinite; margin-top: 30px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .hero-title { 
            font-family: var(--serif); font-size: 3.4rem; font-weight: 800; text-align: center; margin: 15px 0;
            background: linear-gradient(45deg, #6c5ce7, #a29bfe, #e73c7e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .hero-intro { 
            font-size: 1.05rem; line-height: 1.85; color: #4b5155; text-align: justify; 
            margin: 30px 0; padding: 25px 0; border-top: 1px solid rgba(0,0,0,0.06); border-bottom: 1px solid rgba(0,0,0,0.06);
            font-weight: 400;
        }

        .btn-main { 
            background: #1d1d1f; color: white; border: none; padding: 22px; border-radius: 16px; 
            font-weight: 600; width: 100%; font-size: 1.15rem; cursor: pointer; 
            letter-spacing: 4px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* --- 问卷：七阶选项 --- */
        .q-text { font-size: 1.55rem; font-family: var(--serif); line-height: 1.5; min-height: 150px; font-weight: 700; text-align: center; display: flex; align-items: center; justify-content: center; }
        .scale-container { display: flex; justify-content: space-between; align-items: center; margin: 60px 0; }
        .dot { border: 2.5px solid; border-radius: 50%; cursor: pointer; transition: all 0.2s; background: #fff; position: relative; }
        .dot::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 60%; height: 60%; background: currentColor; border-radius: 50%; transition: 0.2s; }
        .dot:active::after { transform: translate(-50%, -50%) scale(1); }
        
        .s3 { width: 54px; height: 54px; } .s2 { width: 42px; height: 42px; } .s1 { width: 32px; height: 32px; }
        .agree { border-color: #00b894; color: #00b894; } 
        .disagree { border-color: #ff7675; color: #ff7675; } 
        .neutral { border-color: #b2bec3; width: 26px; height: 26px; color: #b2bec3; }

        /* --- 结果页：英文字体与Emoji --- */
        .res-mbti { font-family: var(--serif); font-style: italic; color: var(--p); font-size: 1.6rem; letter-spacing: 6px; font-weight: 800; text-align: center; }
        .res-name { font-family: var(--serif); font-size: 3.2rem; margin: 5px 0 10px 0; text-align: center; font-weight: 400; color: #1d1d1f; }
        .res-desc { font-family: var(--serif); line-height: 1.8; font-size: 1.05rem; background: rgba(255,255,255,0.6); padding: 25px; border-radius: 18px; border: 1px solid rgba(0,0,0,0.05); margin-top: 10px; }
        
        .trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .trait-card { background: white; border: 1px solid #f0f0f5; padding: 18px 10px; border-radius: 14px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .trait-card b { display: block; font-size: 1.1rem; margin-bottom: 5px; }
        .trait-card span { font-size: 0.9rem; color: #636e72; font-family: var(--sans); }

        .chart-wrap { width: 100%; height: 300px; margin: 10px 0; position: relative; }
    </style>
</head>
<body>

<div id="app">
    <section id="landing" class="screen">
        <div class="hero-icon">🎻</div>
        <h1 class="hero-title">声命镜像</h1>
        <div class="hero-intro">
            音乐是灵魂的几何学。在这个喧嚣的时代，总有一段旋律能精准捕捉你内心的频率。我们将通过灵魂调律题，在古典大师中，寻找那个跨越时空与你共鸣的镜像。
        </div>
        <button class="btn-main" onclick="start()">开启调律 JOURNEY</button>
    </section>

    <section id="quiz" class="screen hidden">
        <div style="width:100%; height:4px; background:rgba(0,0,0,0.05); border-radius:2px;"><div id="p-bar" style="height:100%; background:var(--p); width:0%; transition:0.3s; border-radius:2px;"></div></div>
        <div class="q-text" id="q-text">正在共鸣...</div>
        
        <div class="scale-container">
            <div class="dot agree s3" onclick="next(3)"></div>
            <div class="dot agree s2" onclick="next(2)"></div>
            <div class="dot agree s1" onclick="next(1)"></div>
            <div class="dot neutral" onclick="next(0)"></div>
            <div class="dot disagree s1" onclick="next(-1)"></div>
            <div class="dot disagree s2" onclick="next(-2)"></div>
            <div class="dot disagree s3" onclick="next(-3)"></div>
        </div>
        
        <div style="display:flex; justify-content:space-between; font-weight:800; color:#b2bec3; font-size:0.75rem; letter-spacing:1px;">
            <span style="color:#00b894">非常认同 AGREE</span>
            <span>中立</span>
            <span style="color:#ff7675">非常反对 DISAGREE</span>
        </div>
    </section>

    <section id="result" class="screen hidden">
        <div id="res-mbti" class="res-mbti">INTJ</div>
        <h1 id="res-name" class="res-name">贝多芬</h1>
        
        <div class="chart-wrap"><canvas id="myChart"></canvas></div>

        <div id="res-desc" class="res-desc"></div>
        <div id="trait-grid" class="trait-grid"></div>
        
        <p style="text-align:center; margin-top:40px; color:#bbb; cursor:pointer; font-size:0.8rem; letter-spacing:2px; font-weight:bold;" onclick="location.reload()">REPLAY 重新调律</p>
    </section>
</div>

<script>
    // 16人格数据库补完
    const db = {
        "INTJ": { name: "贝多芬", mbti: "INTJ", desc: "你是伟大的构建者。擅长在混沌中建立宏伟秩序，用坚韧意志对抗命运。你不屑于表面的装饰，更倾向于在严谨的结构中爆发惊人的生命力量。", traits: ["🏔️ 意志爆发", "🧠 逻辑缜密", "🦅 独立深邃", "🔭 远见卓识"], stats: [85, 95, 100, 92, 85, 95] },
        "INTP": { name: "勋伯格", mbti: "INTP", desc: "你是理性的探险家。敢于拆解传承百年的规则，构建属于未来的逻辑体系。你对真理的追求远超感性的共鸣，是打破旧世界的先驱。", traits: ["🧪 拆解重构", "📐 绝对理性", "🧱 客观严苛", "🌌 突破边界"], stats: [40, 98, 88, 95, 90, 100] },
        "INFJ": { name: "拉威尔", mbti: "INFJ", desc: "你是完美的灵魂工匠。将炽热的情感浓缩在最严苛的框架下，每一丝情绪都经过精确计算。你拥有看透人心的直觉，追求极致的艺术境界。", traits: ["💎 完美主义", "🧘 内敛克制", "🎨 极致细腻", "🕯️ 精神向导"], stats: [92, 85, 90, 95, 88, 92] },
        "INFP": { name: "肖邦", mbti: "INFP", desc: "你是灵魂的低语者。用纤细的旋律承载最深沉的忧郁，在孤独中绽放灵魂之火。你不需要宏大的叙事，一朵花的凋零也能让你写出不朽的乐章。", traits: ["🦢 极致纤细", "🥀 浪漫幻想", "🌙 孤独美学", "❤️ 真挚共鸣"], stats: [98, 30, 85, 90, 80, 90] },
        "ISTJ": { name: "巴赫", mbti: "ISTJ", desc: "你是宇宙秩序的翻译官。在最严密的复调逻辑中触碰神圣的永恒。规则对你而言不是束缚，而是通往宇宙真理的唯一路径。", traits: ["🏛️ 规律严谨", "🔢 逻辑巅峰", "⚓ 专注可靠", "♾️ 永恒秩序"], stats: [30, 100, 95, 98, 90, 50] },
        "ISFJ": { name: "勃拉姆斯", mbti: "ISFJ", desc: "你是传统的守望者。在古典形式中包裹着最厚重的人文关怀，内敛且坚定。你甘于在寂寞中打磨作品，追求经得起时间考验的深度。", traits: ["🛡️ 稳重可靠", "🍷 内敛深情", "📜 敬畏传统", "⏳ 极致耐心"], stats: [85, 88, 70, 92, 85, 80] },
        "ISTP": { name: "维瓦尔第", mbti: "ISTP", desc: "你是自然的捕捉者。拥有惊人的专注力与实践力，擅长捕捉四季瞬时的灵感。你不仅是艺术家，更是深谙技术与自然的巧匠。", traits: ["⚙️ 务实高效", "⚡ 瞬间爆发", "💻 技术宅力", "🍃 自然灵性"], stats: [70, 90, 85, 88, 90, 95] },
        "ISFP": { name: "舒伯特", mbti: "ISFP", desc: "你是纯粹的吟游诗人。灵感如同泉水自然涌现，不带半分匠气。你活在当下，用音乐描绘生命中每一个动人的瞬间。", traits: ["🎨 纯真本能", "🎹 艺术灵感", "⛅ 活在当下", "🧚 不染尘埃"], stats: [92, 35, 80, 85, 82, 90] },
        "ENTJ": { name: "李斯特", mbti: "ENTJ", desc: "你是时代的引领者。拥有卓越技巧与宏大远见，天生属于舞台的中心。你擅长整合资源与情感，将音乐化作征服世界的权杖。", traits: ["👑 领袖气质", "⚡ 技巧巅峰", "🗺️ 掌控全局", "🚀 极具开创"], stats: [88, 90, 92, 95, 98, 95] },
        "ENTP": { name: "普罗科菲耶夫", mbti: "ENTP", desc: "你是机敏的博弈者。乐于挑战常规，用出其不意的逻辑和尖锐的节奏给世界带来惊喜。你不畏惧争议，甚至享受挑战传统的快感。", traits: ["🎭 犀利幽默", "🔥 挑战传统", "🎲 灵活多变", "💡 智力驱动"], stats: [75, 85, 95, 88, 92, 100] },
        "ENFJ": { name: "柴可夫斯基", mbti: "ENFJ", desc: "你是情感的共振者。你的真挚能击中人心最柔软的地方，温暖且富有力量。你活在人与人的连接中，将博大的爱倾注于每一个音符。", traits: ["🔥 极致热忱", "🤝 同理心强", "🌟 极具魅力", "📢 情感领袖"], stats: [95, 50, 80, 90, 95, 92] },
        "ENFP": { name: "舒曼", mbti: "ENFP", desc: "你是永恒的追梦人。你的世界充满幻想与炽热，你是跨越现实与理想边境的探险家。你的生命是一场永不谢幕的浪漫冒险。", traits: ["🦄 狂热激情", "🌈 跳跃创意", "📚 博学多才", "✨ 理想主义"], stats: [95, 40, 90, 85, 95, 98] },
        "ESTJ": { name: "海顿", mbti: "ESTJ", desc: "你是秩序的组织者。在平衡与稳定中寻找乐趣，是值得所有人信赖的基石。你用幽默和智慧维系着世界的和谐运作。", traits: ["🏗️ 秩序井然", "🎩 幽默稳重", "📈 高效产出", "🤝 值得信赖"], stats: [60, 95, 75, 90, 95, 85] },
        "ESFJ": { name: "门德尔松", mbti: "ESFJ", desc: "你是优雅的协调者。追求极致的平衡与得体，将复杂的关系处理得如旋律般顺滑。你走到哪里，哪里就充满了和谐的乐声。", traits: ["🦋 优雅得体", "🎪 社交核心", "🕊️ 追求和谐", "🍃 温润如玉"], stats: [85, 80, 80, 85, 95, 88] },
        "ESTP": { name: "莫扎特", mbti: "ESTP", desc: "你是天生的宠儿。规则对你而言是玩具，拥有举重若轻的直觉。你在极其复杂的博弈中保持透明的天真，是永恒的少年。", traits: ["🎯 直觉惊人", "🎈 轻快灵动", "🌪️ 应变极强", "🎢 举重若轻"], stats: [80, 50, 98, 95, 90, 100] },
        "ESFP": { name: "格里格", mbti: "ESFP", desc: "你是生命的舞者。热爱鲜活的色彩与民族根脉，总能从日常烟火中提炼出跳动的生命力，让周围的一切都欢快起来。", traits: ["💃 感染力强", "🎨 色彩斑斓", "🐾 活泼灵动", "🔥 真挚热情"], stats: [90, 40, 85, 80, 95, 92] }
    };

    const qs = [
        { q: "比起喧闹的社交场合，你更倾向于在安静的独处中获取能量。", t: "I" },
        { q: "在做决策时，你更相信逻辑分析而非一时的直觉或情感。", t: "T" },
        { q: "你经常被抽象的理念和未来的各种可能性所吸引。", t: "N" },
        { q: "你喜欢生活有条理，通常会为每天的活动制定计划。", t: "J" },
        { q: "你很容易被电影、艺术作品或他人的情感故事所打动。", t: "F" },
        { q: "在人群中，你通常是那个能通过交流感到精神振奋的人。", t: "E" },
        { q: "你更信任客观事实和确凿的证据，而非天马行空的灵感。", t: "S" },
        { q: "你喜欢随性而为，认为过多的计划会限制你的发挥。", t: "P" },
        { q: "在争论中，你优先考虑真相和逻辑，即便这可能显得有些冷漠。", t: "T" },
        { q: "你对事物未来的长期走向有着非常强烈且准确的直觉。", t: "N" },
        { q: "你更看重实际的成果，而不是虚无缥缈的理论探讨。", t: "S" },
        { q: "维护集体的和谐对你来说，比争论谁对谁错更重要。", t: "F" },
        { q: "你的工作台或房间通常被打理得井井有条。", t: "J" },
        { q: "你喜欢挑战现有的规则，尝试更具创意的解决办法。", t: "P" },
        { q: "阅读一本深奥的书或聆听复杂的复调音乐是你理想的放松方式。", t: "I" },
        { q: "你并不反感成为众人的焦点，甚至乐于展现自己的才华。", t: "E" },
        { q: "你对数字、模式和客观规律有一种天然的亲近感。", t: "T" },
        { q: "在面临选择时，你首先考虑的是：‘这是否符合我的核心价值观？’", t: "F" },
        { q: "你更习惯先完成手头的工作，再去尝试新的任务。", t: "J" },
        { q: "你的脑海中经常会有跳跃式的创意，有时甚至让自己停不下来。", t: "N" }
    ];

    let step = 0;
    let sc = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function start() {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        render();
    }

    function render() {
        document.getElementById('q-text').innerText = qs[step].q;
        document.getElementById('p-bar').style.width = `${((step+1)/qs.length)*100}%`;
    }

    function next(v) {
        const q = qs[step];
        const opp = {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'};
        if(v > 0) sc[q.t] += v; 
        else if(v < 0) sc[opp[q.t]] += Math.abs(v);
        else { sc[q.t]+=0.1; sc[opp[q.t]]+=0.1; } // 中立
        
        step++;
        if(step < qs.length) render(); else show();
    }

    function show() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const m = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        const p = db[m] || db["INTJ"];
        
        document.getElementById('res-mbti').innerText = p.mbti;
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-desc').innerText = p.desc;
        
        // 渲染详细分析卡片
        document.getElementById('trait-grid').innerHTML = p.traits.map(t => {
            const parts = t.split(' ');
            return `<div class="trait-card"><b>${parts[0]}</b><span>${parts[1]}</span></div>`;
        }).join('');
        
        // 渲染雷达图
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['感性', '理性', '创造', '逻辑', '影响', '稳定'],
                datasets: [{
                    data: p.stats,
                    backgroundColor: 'rgba(108, 92, 231, 0.35)',
                    borderColor: 'rgba(108, 92, 231, 1)',
                    borderWidth: 2,
                    pointRadius: 4,
                    pointBackgroundColor: '#fff'
                }]
            },
            options: {
                scale: {
                    ticks: { beginAtZero: true, max: 100, display: false },
                    pointLabels: { fontSize: 13, fontStyle: 'bold', fontColor: '#2d3436' }
                },
                legend: { display: false }
            }
        });
    }
</script>
</body>
</html>
