<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>声命镜像 - 寻找你的古典灵魂</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4"></script>

    <style>
        :root {
            --p: #6c5ce7;
            --serif: "Georgia", "Times New Roman", "STSong", "Songti SC", serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: -apple-system, sans-serif;
            display: flex; justify-content: center; min-height: 100vh; color: #1d1d1f;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app { 
            width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.96); 
            min-height: 100vh; display: flex; flex-direction: column; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.2); position: relative;
            backdrop-filter: blur(8px);
        }

        .screen { padding: 40px 30px; flex: 1; display: flex; flex-direction: column; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* --- 首页：小提琴与详细简介 --- */
        .hero-icon { font-size: 70px; animation: float 3s ease-in-out infinite; margin-bottom: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .hero-title { 
            font-family: var(--serif); font-size: 3.5rem; font-weight: bold;
            background: linear-gradient(to right, #6c5ce7, #a29bfe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .hero-intro { 
            font-size: 1rem; line-height: 1.8; color: #636e72; text-align: justify;
            margin: 20px 0 40px 0; border-top: 1px solid #eee; padding-top: 20px;
        }

        .btn-main { 
            background: #1d1d1f; color: white; border: none; padding: 20px; border-radius: 12px; 
            font-weight: bold; width: 100%; font-size: 1.1rem; cursor: pointer; 
            letter-spacing: 4px; transition: 0.3s; margin-top: auto;
        }

        /* --- 问卷 --- */
        .prog-bar-container { width: 100%; height: 4px; background: #eee; margin-bottom: 40px; }
        .prog-bar-fill { height: 100%; background: var(--p); width: 0%; transition: 0.3s; }
        .q-text { font-size: 1.6rem; font-family: var(--serif); line-height: 1.5; height: 160px; font-weight: bold; }
        
        .scale-box { display: flex; justify-content: space-between; align-items: center; margin: 40px 0; }
        .dot { border: 2.5px solid; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .s3 { width: 56px; height: 56px; } .s2 { width: 44px; height: 44px; } .s1 { width: 34px; height: 34px; }
        .agree { border-color: #00b894; } .disagree { border-color: #ff7675; }

        /* --- 结果页 --- */
        .res-mbti { font-family: var(--serif); font-style: italic; color: var(--p); font-size: 1.6rem; letter-spacing: 5px; font-weight: bold; }
        .res-name { font-family: var(--serif); font-size: 3.2rem; margin: 5px 0 15px 0; }
        .res-desc { font-family: var(--serif); line-height: 1.8; font-size: 1.05rem; background: #f8f9fa; padding: 25px; border-radius: 15px; border-left: 5px solid var(--p); }
        .chart-wrap { width: 100%; height: 320px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="app">
    <section id="landing" class="screen">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div class="hero-icon">🎻</div>
            <h1 class="hero-title">声命镜像</h1>
            <div class="hero-intro">
                音乐是灵魂的几何学。在这个喧嚣的时代，总有一段旋律能精准捕捉你内心的频率。我们将通过20道灵魂调律题，在16位古典大师中，寻找那个跨越时空与你共鸣的镜像。
            </div>
        </div>
        <button class="btn-main" onclick="start()">开启调律 Journey</button>
    </section>

    <section id="quiz" class="screen hidden">
        <div class="prog-bar-container"><div class="prog-bar-fill" id="p-bar"></div></div>
        <div class="q-text" id="q-text">...</div>
        <div class="scale-box">
            <div class="dot agree s3" onclick="next(3)"></div>
            <div class="dot agree s1" onclick="next(1)"></div>
            <div class="dot disagree s1" onclick="next(-1)"></div>
            <div class="dot disagree s3" onclick="next(-3)"></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; color:#999; font-size:0.8rem;">
            <span>非常认同 AGREE</span><span>非常反对 DISAGREE</span>
        </div>
    </section>

    <section id="result" class="screen hidden">
        <div style="text-align:center;">
            <div id="res-mbti" class="res-mbti"></div>
            <h1 id="res-name" class="res-name"></h1>
        </div>

        <div class="chart-wrap">
            <canvas id="myChart"></canvas>
        </div>

        <div id="res-desc" class="res-desc"></div>
        
        <p style="text-align:center; margin-top:30px; color:#bbb; cursor:pointer; font-size:0.8rem; letter-spacing:2px;" onclick="location.reload()">REPLAY 重新调律</p>
    </section>
</div>

<script>
    // 16人格全量数据库
    const db = {
        "INTJ": { name: "贝多芬", mbti: "INTJ", desc: "你是伟大的构建者。擅长在混沌中建立宏伟秩序，用坚韧意志对抗命运。你不屑于表面的装饰，更倾向于在严谨的结构中爆发惊人的生命力量。", stats: [85, 95, 100, 92, 85, 95] },
        "INTP": { name: "勋伯格", mbti: "INTP", desc: "你是理性的探险家。敢于拆解传承百年的规则，构建属于未来的逻辑体系。你对真理的追求远超感性的共鸣，是打破旧世界的先驱。", stats: [40, 98, 88, 95, 90, 100] },
        "INFJ": { name: "拉威尔", mbti: "INFJ", desc: "你是完美的灵魂工匠。将炽热的情感浓缩在最严苛的框架下，每一丝情绪都经过精确计算。你拥有看透人心的直觉，追求极致的艺术境界。", stats: [92, 85, 90, 95, 88, 92] },
        "INFP": { name: "肖邦", mbti: "INFP", desc: "你是灵魂的低语者。用纤细的旋律承载最深沉的忧郁，在孤独中绽放灵魂之火。你不需要宏大的叙事，一朵花的凋零也能让你写出不朽的乐章。", stats: [98, 30, 85, 90, 80, 90] },
        "ISTJ": { name: "巴赫", mbti: "ISTJ", desc: "你是宇宙秩序的翻译官。在最严密的复调逻辑中触碰神圣的永恒。规则对你而言不是束缚，而是通往宇宙真理的唯一路径。", stats: [30, 100, 95, 98, 90, 50] },
        "ISFJ": { name: "勃拉姆斯", mbti: "ISFJ", desc: "你是传统的守望者。在古典形式中包裹着最厚重的人文关怀，内敛且坚定。你甘于在寂寞中打磨作品，追求经得起时间考验的深度。", stats: [85, 88, 70, 92, 85, 80] },
        "ISTP": { name: "维瓦尔第", mbti: "ISTP", desc: "你是自然的捕捉者。拥有惊人的专注力与实践力，擅长捕捉四季瞬时的灵感。你不仅是艺术家，更是深谙技术与自然的巧匠。", stats: [70, 90, 85, 88, 90, 95] },
        "ISFP": { name: "舒伯特", mbti: "ISFP", desc: "你是纯粹的吟游诗人。灵感如同泉水自然涌现，不带半分匠气。你活在当下，用音乐描绘生命中每一个动人的瞬间。", stats: [92, 35, 80, 85, 82, 90] },
        "ENTJ": { name: "李斯特", mbti: "ENTJ", desc: "你是时代的引领者。拥有卓越技巧与宏大远见，天生属于舞台的中心。你擅长整合资源与情感，将音乐化作征服世界的权杖。", stats: [88, 90, 92, 95, 98, 95] },
        "ENTP": { name: "普罗科菲耶夫", mbti: "ENTP", desc: "你是机敏的博弈者。乐于挑战常规，用出其不意的逻辑和尖锐的节奏给世界带来惊喜。你不畏惧争议，甚至享受挑战传统的快感。", stats: [75, 85, 95, 88, 92, 100] },
        "ENFJ": { name: "柴可夫斯基", mbti: "ENFJ", desc: "你是情感的共振者。你的真挚能击中人心最柔软的地方，温暖且富有力量。你活在人与人的连接中，将博大的爱倾注于每一个音符。", stats: [95, 50, 80, 90, 95, 92] },
        "ENFP": { name: "舒曼", mbti: "ENFP", desc: "你是永恒的追梦人。你的世界充满幻想与炽热，你是跨越现实与理想边境的探险家。你的生命是一场永不谢幕的浪漫冒险。", stats: [95, 40, 90, 85, 95, 98] },
        "ESTJ": { name: "海顿", mbti: "ESTJ", desc: "你是秩序的组织者。在平衡与稳定中寻找乐趣，是值得所有人信赖的基石。你用幽默和智慧维系着世界的和谐运作。", stats: [60, 95, 75, 90, 95, 85] },
        "ESFJ": { name: "门德尔松", mbti: "ESFJ", desc: "你是优雅的协调者。追求极致的平衡与得体，将复杂的关系处理得如旋律般顺滑。你走到哪里，哪里就充满了和谐的乐声。", stats: [85, 80, 80, 85, 95, 88] },
        "ESTP": { name: "莫扎特", mbti: "ESTP", desc: "你是天生的宠儿。规则对你而言是玩具，拥有举重若轻的直觉。你在极其复杂的博弈中保持透明的天真，是永恒的少年。", stats: [80, 50, 98, 95, 90, 100] },
        "ESFP": { name: "格里格", mbti: "ESFP", desc: "你是生命的舞者。热爱鲜活的色彩与民族根脉，总能从日常烟火中提炼出跳动的生命力，让周围的一切都欢快起来。", stats: [90, 40, 85, 80, 95, 92] }
    };

    const qs = [
        { q: "比起喧闹的社交场合，你更倾向于在安静的独处中获取能量。", t: "I" },
        { q: "在做决策时，你更相信逻辑分析而非一时的直觉或情感。", t: "T" },
        { q: "你经常被抽象的理念和未来的各种可能性所吸引。", t: "N" },
        { q: "你喜欢生活有条理，通常会为每天的活动制定计划。", t: "J" },
        { q: "你很容易被电影、艺术作品或他人的情感故事所打动。", t: "F" },
        { q: "在人群中，你通常是那个能通过交流感到精神振奋的人。", t: "E" },
        { q: "你更信任客观事实和确凿的证据，而非天马行空的灵感。", t: "S" },
        { q: "你喜欢随性而为，认为过多的计划会限制你的发挥。", t: "P" },
        { q: "在争论中，你优先考虑真相和逻辑，即便这可能显得有些冷漠。", t: "T" },
        { q: "你对事物未来的长期走向有着非常强烈且准确的直觉。", t: "N" },
        { q: "你更看重实际的成果，而不是虚无缥缈的理论探讨。", t: "S" },
        { q: "维护集体的和谐对你来说，比争论谁对谁错更重要。", t: "F" },
        { q: "你的工作台或房间通常被打理得井井有条。", t: "J" },
        { q: "你喜欢挑战现有的规则，尝试更具创意的解决办法。", t: "P" },
        { q: "阅读一本深奥的书或聆听复杂的复调音乐是你理想的放松方式。", t: "I" },
        { q: "你并不反感成为众人的焦点，甚至乐于展现自己的才华。", t: "E" },
        { q: "你对数字、模式和客观规律有一种天然的亲近感。", t: "T" },
        { q: "在面临选择时，你首先考虑的是：‘这是否符合我的核心价值观？’", t: "F" },
        { q: "你更习惯先完成手头的工作，再去尝试新的任务。", t: "J" },
        { q: "你的脑海中经常会有跳跃式的创意，有时甚至让自己停不下来。", t: "N" }
    ];

    let step = 0;
    let sc = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function start() {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        render();
    }

    function render() {
        document.getElementById('q-text').innerText = qs[step].q;
        document.getElementById('p-bar').style.width = `${((step+1)/qs.length)*100}%`;
    }

    function next(v) {
        const q = qs[step];
        const opp = {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'};
        if(v > 0) sc[q.t] += v; else if(v < 0) sc[opp[q.t]] += Math.abs(v);
        step++;
        if(step < qs.length) render(); else show();
    }

    function show() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const m = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        const p = db[m] || db["INTJ"];
        
        document.getElementById('res-mbti').innerText = p.mbti;
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-desc').innerText = p.desc;
        
        // 渲染图表
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['感性', '理性', '创造', '逻辑', '影响', '稳定'],
                datasets: [{
                    data: p.stats,
                    backgroundColor: 'rgba(108, 92, 231, 0.3)',
                    borderColor: 'rgba(108, 92, 231, 1)',
                    borderWidth: 2,
                    pointRadius: 4,
                    pointBackgroundColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scale: {
                    ticks: { beginAtZero: true, max: 100, display: false },
                    pointLabels: { fontSize: 13, fontStyle: 'bold' }
                },
                legend: { display: false }
            }
        });
    }
</script>
</body>
</html>
