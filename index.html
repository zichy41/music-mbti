    <style>

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
        
        body { 
            margin: 0; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; min-height: 100vh;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #app { 
            width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.94); 
            min-height: 100vh; display: flex; flex-direction: column; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.2); position: relative;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        .screen { padding: 45px 25px; flex: 1; display: flex; flex-direction: column; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* --- 首页样式 --- */
        .hero-icon { font-size: 75px; text-align: center; animation: float 3s ease-in-out infinite; margin-top: 30px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .hero-title { 
            font-family: var(--serif); font-size: 3.4rem; font-weight: 800; text-align: center; margin: 15px 0;
            background: linear-gradient(45deg, #6c5ce7, #a29bfe, #e73c7e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .hero-intro { font-size: 1.05rem; line-height: 1.85; color: #4b5155; text-align: justify; margin: 30px 0; padding: 25px 0; border-top: 1px solid rgba(0,0,0,0.06); border-bottom: 1px solid rgba(0,0,0,0.06); }

        .btn-main { background: #1d1d1f; color: white; border: none; padding: 22px; border-radius: 16px; font-weight: 600; width: 100%; font-size: 1.15rem; cursor: pointer; letter-spacing: 4px; margin-top: auto; }

        /* --- 问卷样式 --- */
        .q-text { font-size: 1.55rem; font-family: var(--serif); line-height: 1.5; min-height: 150px; font-weight: 700; text-align: center; display: flex; align-items: center; justify-content: center; }
        .scale-container { display: flex; justify-content: space-between; align-items: center; margin: 60px 0; }
        .dot { border: 2.5px solid; border-radius: 50%; cursor: pointer; transition: all 0.2s; background: #fff; }
        .s3 { width: 54px; height: 54px; } .s2 { width: 42px; height: 42px; } .s1 { width: 32px; height: 32px; }
        .agree { border-color: #00b894; color: #00b894; } .disagree { border-color: #ff7675; color: #ff7675; } .neutral { border-color: #b2bec3; width: 26px; height: 26px; color: #b2bec3; }

        /* --- 结果页样式 --- */
        .res-mbti { font-family: var(--serif); font-style: italic; color: var(--p); font-size: 1.6rem; letter-spacing: 6px; font-weight: 800; text-align: center; }
        .res-name { font-family: var(--serif); font-size: 3.2rem; margin: 5px 0 10px 0; text-align: center; }
        
        .section-title { font-size: 0.85rem; font-weight: 800; color: var(--p); margin: 25px 0 10px 0; letter-spacing: 2px; text-transform: uppercase; border-left: 3px solid var(--p); padding-left: 10px; }
        
        .res-desc { font-family: var(--serif); line-height: 1.8; font-size: 1.05rem; background: rgba(255,255,255,0.6); padding: 20px; border-radius: 18px; border: 1px solid rgba(0,0,0,0.05); }

        .trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .trait-card { background: white; border: 1px solid #f0f0f5; padding: 15px 8px; border-radius: 14px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .trait-card b { display: block; font-size: 1rem; margin-bottom: 3px; }
        .trait-card span { font-size: 0.8rem; color: #636e72; }

        .rel-container { display: flex; gap: 10px; margin-top: 10px; }
        .rel-box { flex: 1; padding: 12px; border-radius: 14px; background: white; border: 1px solid #f0f0f5; text-align: center; }
        .rel-label { font-size: 0.7rem; font-weight: bold; color: #aaa; margin-bottom: 5px; }
        .rel-pname { font-family: var(--serif); font-size: 1rem; color: #1d1d1f; }

        .chart-wrap { width: 100%; height: 280px; margin: 10px 0; }
    </style>
</head>

        { q: "维护集体的和谐对你来说，比争论谁对谁错更重要。", t: "F" },
        { q: "你的工作台或房间通常被打理得井井有条。", t: "J" },
        { q: "你喜欢挑战现有的规则，尝试更具创意的解决办法。", t: "P" },
        { q: "阅读一本深奥的书或聆听复杂的复调音乐是你理想的放松方式。", t: "I" },
        { q: "你并不反感成为众人的焦点，甚至乐于展现自己的才华。", t: "E" },
        { q: "你对数字、模式 and 客观规律有一种天然的亲近感。", t: "T" },
        { q: "在面临选择时，你首先考虑的是：‘这是否符合我的核心价值观？’", t: "F" },
        { q: "你更习惯先完成手头的工作，再去尝试新的任务。", t: "J" },
        { q: "你的脑海中经常会有跳跃式的创意，有时甚至让自己停不下来。", t: "N" }
    ];

    let step = 0;
    let sc = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function start() {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        render();
    }

    function render() {
        document.getElementById('q-text').innerText = qs[step].q;
        document.getElementById('p-bar').style.width = `${((step+1)/qs.length)*100}%`;
    }

    function next(v) {
        const q = qs[step];
        const opp = {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'};
        if(v > 0) sc[q.t] += v; else if(v < 0) sc[opp[q.t]] += Math.abs(v);
        else { sc[q.t]+=0.1; sc[opp[q.t]]+=0.1; }
        step++;
        if(step < qs.length) render(); else show();
    }

    function show() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const m = (sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
        const p = db[m] || db["INTJ"];
        document.getElementById('res-mbti').innerText = p.mbti;
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-desc').innerText = p.desc;
        document.getElementById('res-works').innerText = p.works;
        document.getElementById('rel-good').innerText = p.good;
        document.getElementById('rel-bad').innerText = p.bad;
        document.getElementById('trait-grid').innerHTML = p.traits.map(t => `<div class="trait-card"><b>${t.split(' ')[0]}</b><span>${t.split(' ')[1]}</span></div>`).join('');
        
        new Chart(document.getElementById('myChart').getContext('2d'), {
            type: 'radar',
            data: {
                labels: ['感性', '理性', '创造', '逻辑', '影响', '稳定'],
                datasets: [{
                    data: p.stats,
                    backgroundColor: 'rgba(108, 92, 231, 0.35)',
                    borderColor: 'rgba(108, 92, 231, 1)',
                    borderWidth: 2,
                    pointRadius: 4,
                    pointBackgroundColor: '#fff'
                }]
            },
            options: {
                scale: {
                    ticks: { beginAtZero: true, max: 100, display: false },
                    pointLabels: { fontSize: 12, fontStyle: 'bold', fontColor: '#2d3436' }
                },
                legend: { display: false }
            }
        });
    }
</script>
</body>
</html>
